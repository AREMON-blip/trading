<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Futures Journal & Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK lewat Script Tag (ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase Pribadi Lo
        const firebaseConfig = {
            apiKey: "AIzaSyD6Ey6cRTbv5ptjqcqyifwPlvT_2kuY_Vs",
            authDomain: "trading-e1dea.firebaseapp.com",
            projectId: "trading-e1dea",
            storageBucket: "trading-e1dea.firebasestorage.app",
            messagingSenderId: "255565818524",
            appId: "1:255565818524:web:5ca8ae2cfed86345cfdb59",
            measurementId: "G-FF8L2EDXK1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'trading-tracker-v1';

        let userUid = null;
        window.currentData = {
            initialBalance: 3,
            currentBalance: 3,
            trades: []
        };

        const userIdDisplay = document.getElementById('userIdDisplay');

        window.updateUI = () => {
            const data = window.currentData;
            const totalPnl = data.currentBalance - data.initialBalance;
            const growth = data.initialBalance > 0 ? (totalPnl / data.initialBalance) * 100 : 0;
            const wins = data.trades.filter(t => t.netProfit > 0).length;
            const winRate = data.trades.length > 0 ? (wins / data.trades.length * 100).toFixed(1) : 0;

            document.getElementById('totalBalanceDisplay').innerText = formatCurrency(data.currentBalance);
            document.getElementById('winRateDisplay').innerText = winRate + "%";
            document.getElementById('totalPnlDisplay').innerText = (totalPnl >= 0 ? '+' : '') + formatCurrency(totalPnl);
            document.getElementById('totalPnlDisplay').className = `text-2xl font-bold ${totalPnl >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;
            
            const growthEl = document.getElementById('growthDisplay');
            growthEl.innerText = `${growth >= 0 ? '+' : ''}${growth.toFixed(2)}% Growth`;
            growthEl.className = growth >= 0 ? "px-2 py-1 rounded-md bg-emerald-500/10 text-emerald-400 text-xs font-bold border border-emerald-500/20" : "px-2 py-1 rounded-md bg-rose-500/10 text-rose-400 text-xs font-bold border border-rose-500/20";
            
            renderHistory();
        };

        const syncToCloud = async () => {
            if (!userUid) return;
            try {
                const userDoc = doc(db, 'trading_apps', appId, 'users', userUid);
                await setDoc(userDoc, window.currentData);
            } catch (e) {
                console.error("Cloud sync failed.", e);
            }
        };

        window.loginGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Google login failed", error);
            }
        };

        window.logout = async () => {
            await signOut(auth);
            location.reload();
        };

        const initApp = () => {
            onAuthStateChanged(auth, (user) => {
                const loginBtn = document.getElementById('loginBtn');
                const logoutBtn = document.getElementById('logoutBtn');

                if (user) {
                    userUid = user.uid;
                    userIdDisplay.innerText = user.isAnonymous ? `Anon ID: ${user.uid.substring(0,8)}...` : `User: ${user.email}`;
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    
                    const userDoc = doc(db, 'trading_apps', appId, 'users', userUid);
                    onSnapshot(userDoc, (docSnap) => {
                        if (docSnap.exists()) {
                            window.currentData = docSnap.data();
                            window.updateUI();
                        } else {
                            syncToCloud();
                        }
                    }, (err) => console.error(err));
                } else {
                    signInAnonymously(auth).catch(err => console.error(err));
                }
            });
        };

        window.addTrade = async () => {
            const coin = document.getElementById('coinName').value || "UNKNOWN";
            const entry = parseFloat(document.getElementById('entryPrice').value);
            const exit = parseFloat(document.getElementById('exitPrice').value);
            const margin = parseFloat(document.getElementById('margin').value);
            const lev = parseFloat(document.getElementById('leverage').value);
            
            if (isNaN(entry) || isNaN(exit) || isNaN(margin) || isNaN(lev)) return;

            const positionSize = margin * lev;
            let priceDiffPercent = (window.tradeSide === 'SHORT') ? ((entry - exit) / entry) : ((exit - entry) / entry);
            const netProfit = (positionSize * priceDiffPercent) - (positionSize * 0.0012);
            
            window.currentData.currentBalance += netProfit;
            window.currentData.trades.unshift({
                id: Date.now(),
                coin: coin.toUpperCase(),
                side: window.tradeSide,
                entry, exit, lev, margin,
                roi: (netProfit / margin) * 100,
                netProfit,
                balanceAfter: window.currentData.currentBalance,
                timestamp: new Date().toISOString()
            });

            await syncToCloud();
            window.showPnLCard(window.currentData.trades[0]);
            
            document.getElementById('coinName').value = '';
            document.getElementById('entryPrice').value = '';
            document.getElementById('exitPrice').value = '';
            document.getElementById('margin').value = '';
        };

        window.resetBalance = async () => {
            const val = prompt("Set Modal Baru (USDT):", window.currentData.initialBalance);
            if (val !== null && !isNaN(parseFloat(val))) {
                if (confirm("Reset data?")) {
                    window.currentData.initialBalance = parseFloat(val);
                    window.currentData.currentBalance = window.currentData.initialBalance;
                    window.currentData.trades = [];
                    await syncToCloud();
                }
            }
        };

        window.addEventListener('DOMContentLoaded', initApp);
    </script>

    <style>
        /* NEW BACKGROUND: Dark Mesh Gradient */
        body { 
            background-color: #020617; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(88, 28, 135, 0.15) 0px, transparent 50%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        
        /* Premium Glassmorphism */
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        
        #pnlCard { 
            background: linear-gradient(145deg, #0f172a 0%, #020617 100%); 
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.1);
        }
        
        input { 
            background-color: rgba(2, 6, 23, 0.8) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important; 
            transition: all 0.2s ease;
        }
        
        input:focus {
            border-color: rgba(59, 130, 246, 0.5) !important;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Card Result Modal -->
    <div id="modalCard" class="fixed inset-0 bg-slate-950/90 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="max-w-sm w-full space-y-4">
            <div id="pnlCard" class="rounded-[2.5rem] p-8 border border-white/10 shadow-2xl relative overflow-hidden">
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <h4 id="cardPair" class="text-2xl font-black text-white tracking-tighter italic">BTCUSDT</h4>
                        <p id="cardSide" class="text-[10px] font-bold px-2 py-0.5 rounded bg-emerald-500 text-white w-fit mt-1">LONG</p>
                    </div>
                    <div class="text-right"><p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Binance Futures</p></div>
                </div>
                <div class="mb-10">
                    <p class="text-slate-500 text-xs mb-1 font-bold">ROE %</p>
                    <h2 id="cardRoe" class="text-7xl font-black text-emerald-400 tracking-tighter">+0.00%</h2>
                </div>
                <div class="grid grid-cols-2 gap-6 border-t border-white/5 pt-6 text-[10px]">
                    <div><p class="text-slate-500 uppercase font-bold mb-1">Entry Price</p><p id="cardEntry" class="text-white font-mono">0.00</p></div>
                    <div><p class="text-slate-500 uppercase font-bold mb-1">Exit Price</p><p id="cardExit" class="text-white font-mono">0.00</p></div>
                    <div class="col-span-2"><p class="text-slate-500 uppercase font-bold mb-1">Total Profit</p><p id="cardPnl" class="text-emerald-400 text-lg font-black">+$0.00</p></div>
                </div>
            </div>
            <button onclick="document.getElementById('modalCard').classList.add('hidden')" class="w-full bg-white/5 hover:bg-white/10 text-white py-4 rounded-2xl font-bold border border-white/10 transition-all">CLOSE JOURNAL</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
            <div id="userIdDisplay" class="text-[10px] text-slate-400 font-mono tracking-wider">Syncing...</div>
            <div class="flex gap-2">
                <button id="loginBtn" onclick="loginGoogle()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl text-xs font-bold transition-all shadow-lg shadow-blue-900/20">
                    Connect Google Cloud
                </button>
                <button id="logoutBtn" onclick="logout()" class="hidden bg-slate-800 text-slate-400 hover:text-white px-5 py-2 rounded-xl text-xs font-bold transition-all">Disconnect</button>
            </div>
        </div>
        
        <!-- Main Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="md:col-span-2 glass-card p-8 rounded-[2rem] relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-8 opacity-10 group-hover:opacity-20 transition-opacity">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <p class="text-slate-500 uppercase tracking-[0.2em] text-[10px] font-bold mb-2">Portfolio Value</p>
                <h1 id="totalBalanceDisplay" class="text-5xl md:text-6xl font-black text-white tracking-tighter">$3.00</h1>
                <div class="flex items-center gap-4 mt-6">
                    <span id="growthDisplay" class="px-3 py-1 rounded-full text-[10px] font-black tracking-tight">+0% Growth</span>
                    <button onclick="resetBalance()" class="text-slate-500 hover:text-rose-500 text-[10px] font-bold uppercase tracking-widest transition-colors">Reset Capital</button>
                </div>
            </div>
            <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-center">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">Success Rate</p>
                <h3 id="winRateDisplay" class="text-4xl font-black text-white">0%</h3>
            </div>
            <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-center">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">Net Profit</p>
                <h3 id="totalPnlDisplay" class="text-4xl font-black text-white">$0.00</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Form -->
            <div class="lg:col-span-4 glass-card p-8 rounded-[2rem] space-y-5 h-fit">
                <h2 class="text-xl font-black text-white italic tracking-tight">EXECUTE TRADE</h2>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Asset Pair</label>
                    <input type="text" id="coinName" placeholder="e.g. SOLUSDT" class="w-full rounded-2xl p-4 outline-none uppercase font-black text-blue-400">
                </div>
                <div class="flex gap-3">
                    <button onclick="setSide('LONG')" id="btnLong" class="flex-1 py-4 rounded-2xl font-black bg-emerald-600 text-white ring-2 ring-emerald-500/50 shadow-lg shadow-emerald-900/20">LONG</button>
                    <button onclick="setSide('SHORT')" id="btnShort" class="flex-1 py-4 rounded-2xl font-black bg-slate-900 text-slate-500 transition-all">SHORT</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-bold uppercase ml-1">Entry</label>
                        <input type="number" id="entryPrice" placeholder="0.00" class="w-full rounded-2xl p-4 outline-none font-mono text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-bold uppercase ml-1">Exit</label>
                        <input type="number" id="exitPrice" placeholder="0.00" class="w-full rounded-2xl p-4 outline-none font-mono text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-bold uppercase ml-1">Margin</label>
                        <input type="number" id="margin" placeholder="3.0" class="w-full rounded-2xl p-4 outline-none font-mono text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-bold uppercase ml-1">Lev x</label>
                        <input type="number" id="leverage" value="10" class="w-full rounded-2xl p-4 outline-none font-mono text-sm">
                    </div>
                </div>
                <button onclick="addTrade()" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl">LOG POSITION</button>
            </div>

            <!-- Table -->
            <div class="lg:col-span-8 glass-card p-8 rounded-[2rem] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-white italic tracking-tight">HISTORY</h2>
                    <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-slate-500 text-[10px] uppercase font-black tracking-[0.2em] border-b border-white/5">
                            <tr><th class="pb-4 px-2">Asset</th><th class="pb-4">Type</th><th class="pb-4 text-center">ROE%</th><th class="pb-4 text-center">Net PnL</th><th class="pb-4 text-right">Action</th></tr>
                        </thead>
                        <tbody id="tradeHistoryBody" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.tradeSide = 'LONG';
        function setSide(side) {
            window.tradeSide = side;
            document.getElementById('btnLong').className = side === 'LONG' ? "flex-1 py-4 rounded-2xl font-black bg-emerald-600 text-white ring-2 ring-emerald-500/50 shadow-lg shadow-emerald-900/20" : "flex-1 py-4 rounded-2xl font-black bg-slate-900 text-slate-500";
            document.getElementById('btnShort').className = side === 'SHORT' ? "flex-1 py-4 rounded-2xl font-black bg-rose-600 text-white ring-2 ring-rose-500/50 shadow-lg shadow-rose-900/20" : "flex-1 py-4 rounded-2xl font-black bg-slate-900 text-slate-500";
        }

        window.showPnLCard = (trade) => {
            document.getElementById('cardPair').innerText = trade.coin;
            document.getElementById('cardSide').innerText = `${trade.side} ${trade.lev}x`;
            document.getElementById('cardSide').className = `text-[10px] font-bold px-2 py-0.5 rounded text-white w-fit mt-1 ${trade.side === 'LONG' ? 'bg-emerald-600' : 'bg-rose-600'}`;
            document.getElementById('cardRoe').innerText = `${trade.roi >= 0 ? '+' : ''}${trade.roi.toFixed(2)}%`;
            document.getElementById('cardRoe').className = `text-7xl font-black tracking-tighter ${trade.roi >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;
            document.getElementById('cardPnl').innerText = `${trade.netProfit >= 0 ? '+' : ''}${formatCurrency(trade.netProfit)}`;
            document.getElementById('cardEntry').innerText = trade.entry.toLocaleString();
            document.getElementById('cardExit').innerText = trade.exit.toLocaleString();
            document.getElementById('modalCard').classList.remove('hidden');
        };

        function renderHistory() {
            const body = document.getElementById('tradeHistoryBody');
            if(!body) return;
            if (window.currentData.trades.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="py-20 text-center text-slate-600 font-bold uppercase tracking-widest text-xs opacity-50">No Data Logged</td></tr>';
                return;
            }
            body.innerHTML = window.currentData.trades.map(t => `
                <tr class="border-b border-white/5 hover:bg-white/[0.03] transition-all group">
                    <td class="py-5 px-2">
                        <div class="font-black text-blue-400 italic">${t.coin}</div>
                        <div class="text-[9px] text-slate-600 font-bold">${new Date(t.timestamp || t.id).toLocaleDateString()}</div>
                    </td>
                    <td class="py-5"><span class="${t.side === 'LONG' ? 'text-emerald-500' : 'text-rose-500'} font-black text-xs tracking-tighter">${t.side} ${t.lev}x</span></td>
                    <td class="py-5 text-center font-black ${t.roi >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${t.roi.toFixed(1)}%</td>
                    <td class="py-5 text-center font-bold ${t.netProfit >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${formatCurrency(t.netProfit)}</td>
                    <td class="py-5 text-right"><button onclick='window.showPnLCard(${JSON.stringify(t)})' class="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl text-white text-[10px] font-black transition-all border border-white/10 uppercase tracking-tighter">View Card</button></td>
                </tr>
            `).join('');
        }

        function formatCurrency(val) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val); }
    </script>
</body>
</html>
